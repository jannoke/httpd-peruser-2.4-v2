name: Build RPM Packages

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build SRPM and RPM (Rocky Linux 9)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: rockylinux:9

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install dnf-plugins-core -y
          dnf config-manager --set-enabled crb
          dnf install -y \
            rpm-build \
            rpmdevtools \
            dnf-plugins-core \
            gcc \
            autoconf \
            pkgconfig \
            findutils \
            xmlto \
            perl-interpreter \
            perl-generators \
            systemd-devel \
            zlib-devel \
            libselinux-devel \
            lua-devel \
            brotli-devel \
            apr-devel \
            apr-util-devel \
            pcre-devel \
            gnupg2 \
            systemd-rpm-macros \
            openssl-devel \
            libtool \
            which \
            make \
            libxml2-devel
          dnf clean all

      - name: Set up RPM build tree
        run: rpmdev-setuptree

      - name: Copy source files into rpmbuild tree
        run: |
          cp -r src/. "$HOME/rpmbuild/SOURCES/"
          mv "$HOME/rpmbuild/SOURCES/httpd.spec" "$HOME/rpmbuild/SPECS/httpd.spec"

      - name: Import GPG keys
        run: gpg --import "$HOME/rpmbuild/SOURCES/KEYS" 2>/dev/null || true

      - name: Build SRPM
        run: |
          rpmbuild -bs "$HOME/rpmbuild/SPECS/httpd.spec" 2>&1 | tee /tmp/srpm-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "SRPM build exit code: $BUILD_EXIT"
          exit $BUILD_EXIT

      - name: Build RPM from SRPM
        run: |
          SRPM=$(find "$HOME/rpmbuild/SRPMS/" -name "*.src.rpm" | head -n 1)
          echo "Building RPM from: $SRPM"
          rpmbuild --rebuild "$SRPM" 2>&1 | tee /tmp/rpm-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "RPM build exit code: $BUILD_EXIT"
          exit $BUILD_EXIT

      - name: List build artifacts
        if: always()
        run: |
          echo "=== SRPMs ==="
          find "$HOME/rpmbuild/SRPMS/" -name "*.src.rpm" 2>/dev/null || echo "No SRPMs found"
          echo "=== RPMs ==="
          find "$HOME/rpmbuild/RPMS/" -name "*.rpm" 2>/dev/null || echo "No RPMs found"

      - name: Upload SRPM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: srpm
          path: ~/rpmbuild/SRPMS/*.src.rpm
          if-no-files-found: warn

      - name: Upload RPM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rpms
          path: ~/rpmbuild/RPMS/**/*.rpm
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/*-build.log
          if-no-files-found: ignore

  test-rpm:
    name: Test Peruser MPM (Rocky Linux 9)
    needs: build-rpm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: rockylinux:9
      options: --privileged

    steps:
      - name: Download built RPMs
        uses: actions/download-artifact@v4
        with:
          name: rpms
          path: /tmp/rpms

      - name: Install httpd and dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False --allowerasing httpd-filesystem curl
          dnf clean all

      - name: Install built peruser RPM
        run: |
          echo "=== Available RPMs ==="
          find /tmp/rpms -name "*.rpm" | grep -v debuginfo | grep -v src
          RPMS=$(find /tmp/rpms -name "httpd-*.rpm" | grep -v debuginfo | grep -v src)
          echo "Installing: $RPMS"
          dnf install -y $RPMS

      - name: Install debug tools
        run: |
          dnf install -y gdb
          # Install debuginfo if available (best effort)
          dnf debuginfo-install -y httpd 2>/dev/null || true
          dnf clean all

      - name: Enable core dumps
        run: |
          ulimit -c unlimited
          mkdir -p /tmp/coredumps
          echo "/tmp/coredumps/core.%e.%p" > /proc/sys/kernel/core_pattern || true
          echo "Core pattern: $(cat /proc/sys/kernel/core_pattern)"

      - name: "[1/6] Create test user and files"
        run: |
          echo "=== Starting Peruser MPM Functional Tests ==="
          echo ""
          echo "[1/6] Creating test user and files..."

          # Create dedicated test user separate from apache
          useradd -r -m -d /home/testuser -s /sbin/nologin testuser
          echo "✓ Test user created: testuser (uid=$(id -u testuser))"

          # Ensure document root exists
          mkdir -p /var/www/html

          # Create test HTML file with unique verifiable content
          cat > /var/www/html/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><title>Peruser MPM Test</title></head>
          <body>
          <h1>Peruser MPM Test Page</h1>
          <p>Test ID: PERUSER_TEST_12345</p>
          <p>If you can read this, the file was served successfully!</p>
          </body>
          </html>
          HTMLEOF

          chown testuser:testuser /var/www/html/index.html
          chmod 644 /var/www/html/index.html
          echo "✓ Test file created: /var/www/html/index.html"
          echo "  Owner: $(stat -c '%U:%G' /var/www/html/index.html)"
          echo "  Perms: $(stat -c '%a' /var/www/html/index.html)"

      - name: "[2/6] Configure httpd with peruser MPM"
        run: |
          echo "[2/6] Configuring httpd with peruser MPM..."

          # Ensure only the peruser MPM is loaded (disable all others)
          cat > /etc/httpd/conf.modules.d/00-mpm.conf << 'EOF'
          # Only peruser MPM is loaded - all other MPMs are disabled
          LoadModule mpm_peruser_module modules/mod_mpm_peruser.so
          #LoadModule mpm_prefork_module modules/mod_mpm_prefork.so
          #LoadModule mpm_worker_module modules/mod_mpm_worker.so
          #LoadModule mpm_event_module modules/mod_mpm_event.so
          EOF

          # Write peruser-specific configuration
          # Notes on cgroup:
          #   - The original Cgroup directive used cgroup v1 paths (/dev/cgroup/...)
          #   - Rocky Linux 9 uses cgroup v2 exclusively; cgroup v1 is not available
          #   - Cgroup is therefore omitted here; peruser handles a missing cgroup
          #     gracefully (logs a warning and continues without it)
          cat > /etc/httpd/conf.d/peruser.conf << 'EOF'
          # Peruser MPM main configuration
          <IfModule mpm_peruser_module>
              ServerLimit          2
              StartServers         1
              MinSpareProcessors   1
              MaxSpareProcessors   1
              MaxClients           10
              ExpireTimeout        5
          </IfModule>

          # Processor definition: runs as the dedicated testuser
          # Cgroup directives are intentionally omitted:
          #   Rocky Linux 9 uses cgroup v2 which is incompatible with the
          #   cgroup v1 paths used by the peruser Cgroup directive.
          #   Peruser will log a warning if a Cgroup path is set but
          #   inaccessible, and continues without cgroup isolation.
          Processor testuser testuser

          # Virtual host on port 8080 with testuser worker processes
          <VirtualHost *:8080>
              ServerName localhost
              DocumentRoot /var/www/html
              AssignUserID testuser testuser
          </VirtualHost>

          Listen 8080
          EOF

          echo "✓ Configuration written"

          echo "=== /etc/httpd/conf.modules.d/00-mpm.conf ==="
          cat /etc/httpd/conf.modules.d/00-mpm.conf
          echo "=== /etc/httpd/conf.d/peruser.conf ==="
          cat /etc/httpd/conf.d/peruser.conf

      - name: Syntax check (httpd -t)
        run: |
          echo "Running: httpd -t"
          httpd -t 2>&1
          SYNTAX_EXIT=$?
          echo "Syntax check exit code: $SYNTAX_EXIT"
          if [ "$SYNTAX_EXIT" -eq 0 ]; then
            echo "✓ Syntax check passed"
          fi
          exit $SYNTAX_EXIT

      - name: "[3/6] Start httpd"
        id: httpd_start
        run: |
          echo "[3/6] Starting httpd..."

          # Enable core dumps for this shell session
          ulimit -c unlimited

          # Start httpd in background mode
          httpd -k start 2>&1 | tee /tmp/httpd-start.log
          HTTPD_EXIT=$?

          if [ "$HTTPD_EXIT" -ne 0 ]; then
            echo "ERROR: httpd failed to start (exit code: $HTTPD_EXIT)"
            cat /tmp/httpd-start.log
            cat /var/log/httpd/error_log 2>/dev/null || true
            exit "$HTTPD_EXIT"
          fi

          # Wait for httpd to fully start
          sleep 3

          # Verify it is actually running
          if ! pgrep -x httpd > /dev/null; then
            echo "ERROR: httpd process not found after start"
            cat /var/log/httpd/error_log 2>/dev/null || true
            exit 1
          fi

          echo "✓ httpd started successfully"
          echo "  PID(s): $(pgrep -x httpd | tr '\n' ' ')"

      - name: "[4/6] Test HTTP requests"
        run: |
          echo "[4/6] Testing HTTP requests..."
          FAILED=0

          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /tmp/response_${i}.html -w "%{http_code}" http://localhost:8080/)
            CURL_EXIT=$?

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "❌ Request $i: curl failed (exit code: $CURL_EXIT)"
              FAILED=1
              continue
            fi

            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Request $i: Expected HTTP 200, got $HTTP_CODE"
              echo "   Response body:"
              cat /tmp/response_${i}.html
              FAILED=1
              continue
            fi

            if ! grep -q "PERUSER_TEST_12345" /tmp/response_${i}.html; then
              echo "❌ Request $i: HTTP $HTTP_CODE but response does not contain expected content"
              echo "   Expected: PERUSER_TEST_12345"
              echo "   Response was:"
              cat /tmp/response_${i}.html
              FAILED=1
              continue
            fi

            echo "✓ Request $i: HTTP $HTTP_CODE, content verified"
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "ERROR: One or more HTTP requests failed"
            echo "=== Verbose curl output ==="
            curl -v http://localhost:8080/ 2>&1 || true
            echo "=== httpd error log ==="
            cat /var/log/httpd/error_log 2>/dev/null || echo "(no error log)"
            echo "=== httpd access log ==="
            cat /var/log/httpd/access_log 2>/dev/null || echo "(no access log)"
            exit 1
          fi

      - name: "[5/6] Verify multi-user processes"
        run: |
          echo "[5/6] Verifying multi-user processes..."

          # Give processes additional time to spawn after requests
          sleep 5

          echo "=== Process Tree ==="
          ps auxf | grep -E "httpd|apache|testuser" | grep -v grep || true

          echo ""
          echo "=== Process Count by User ==="
          APACHE_PROCS=$(pgrep -u apache -x httpd 2>/dev/null | wc -l)
          TESTUSER_PROCS=$(pgrep -u testuser -x httpd 2>/dev/null | wc -l)

          echo "Apache user processes: $APACHE_PROCS (multiplexer)"
          echo "Testuser processes:    $TESTUSER_PROCS (workers)"

          # FAIL if no testuser processes exist
          if [ "$TESTUSER_PROCS" -eq 0 ]; then
            echo ""
            echo "❌ FAIL: No httpd processes running as testuser!"
            echo "Peruser MPM is NOT working - all processes running as apache user"
            echo ""
            echo "=== Full process list ==="
            ps aux | grep -E "httpd|apache|testuser" | grep -v grep || true
            echo "=== httpd error log ==="
            cat /var/log/httpd/error_log 2>/dev/null || echo "(no error log)"
            exit 1
          fi

          echo ""
          echo "✓ Peruser MPM is working correctly!"
          echo "  Found $TESTUSER_PROCS httpd worker process(es) running as testuser"

      - name: "[6/6] Process tree summary"
        run: |
          echo "[6/6] Process tree:"
          ps auxf | grep -E "httpd|apache|testuser" | grep -v grep || true
          echo ""
          echo "=== All Tests PASSED ==="

      - name: Analyze core dump with gdb
        if: failure() && steps.httpd_start.outputs.httpd_crashed == 'true'
        run: |
          echo "=== Searching for core dump ==="
          CORE=$(find /tmp/coredumps /tmp -name "core.*" -o -name "core" 2>/dev/null | head -n 1)

          if [ -z "$CORE" ]; then
            echo "No core dump found in /tmp/coredumps or /tmp"
            # Try systemd coredump
            if command -v coredumpctl &>/dev/null; then
              echo "=== Trying coredumpctl ==="
              coredumpctl list 2>&1 || true
              coredumpctl info httpd 2>&1 | tee /tmp/coredump-info.txt || true
            fi
          else
            echo "Found core dump: $CORE"

            HTTPD_BIN=$(which httpd)
            echo "httpd binary: $HTTPD_BIN"

            # Create gdb command script
            cat > /tmp/gdb-commands.txt << 'GDBEOF'
          set pagination off
          bt full
          info threads
          thread apply all bt full
          info registers
          info sharedlibrary
          GDBEOF

            echo "=== Running gdb on core dump ==="
            gdb --batch \
              -x /tmp/gdb-commands.txt \
              "$HTTPD_BIN" "$CORE" \
              2>&1 | tee /tmp/backtrace.txt

            echo "=== GDB Backtrace Summary ==="
            cat /tmp/backtrace.txt
          fi

      - name: Collect debug artifacts
        if: always()
        run: |
          mkdir -p /tmp/debug-artifacts

          # httpd logs
          cp /var/log/httpd/error_log /tmp/debug-artifacts/ 2>/dev/null || true
          cp /var/log/httpd/access_log /tmp/debug-artifacts/ 2>/dev/null || true

          # httpd start output
          cp /tmp/httpd-start.log /tmp/debug-artifacts/ 2>/dev/null || true

          # HTTP response bodies captured during test
          cp /tmp/response_*.html /tmp/debug-artifacts/ 2>/dev/null || true

          # gdb backtrace (if produced)
          cp /tmp/backtrace.txt /tmp/debug-artifacts/ 2>/dev/null || true
          cp /tmp/coredump-info.txt /tmp/debug-artifacts/ 2>/dev/null || true

          # Configuration files used for the test
          cp /etc/httpd/conf.modules.d/00-mpm.conf /tmp/debug-artifacts/ 2>/dev/null || true
          cp /etc/httpd/conf.d/peruser.conf /tmp/debug-artifacts/ 2>/dev/null || true

          # Test file and its permissions
          ls -la /var/www/html/ > /tmp/debug-artifacts/webroot-perms.txt 2>/dev/null || true

          # Core dumps
          find /tmp/coredumps -name "core.*" -exec cp {} /tmp/debug-artifacts/ \; 2>/dev/null || true

          # SELinux denials (best effort)
          ausearch -m avc -ts recent 2>/dev/null > /tmp/debug-artifacts/selinux-denials.txt || true

          echo "=== Debug artifacts collected ==="
          ls -lh /tmp/debug-artifacts/

          echo "=== httpd error log ==="
          cat /tmp/debug-artifacts/error_log 2>/dev/null || echo "(no error log)"

          echo "=== httpd access log ==="
          cat /tmp/debug-artifacts/access_log 2>/dev/null || echo "(no access log)"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: /tmp/debug-artifacts/
          if-no-files-found: ignore
